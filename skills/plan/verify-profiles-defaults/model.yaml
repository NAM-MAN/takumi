    ac_text: "カート操作 (add/remove/update) の整合性を保つ。合計金額は常に正。"
  - ac_id: "AC-WORKFLOW-014"
    ac_text: "承認ワークフロー (draft/review/approved/rejected) は各ステップ順序制約を満たす。"
