name: "list-standard"
description: "list + detail の王道画面。カード or table、pagination 中心。"
layout:
  container: "max-w-[1080px] mx-auto"
  sidebar: null
  content_padding: "px-6 py-8"
  grid_unit: 4
typography:
  scale_emphasis: "content"
  table_density: "standard"
interactions:
  row_hover: true
  row_focus_ring: true
  skeleton_loader: true
  optimistic_update: false
primary_patterns:
  - "list-view"
  - "filter-bar"
  - "pagination"
  - "detail-panel"
required_components:
  - "List"
  - "Pagination"
  - "Filter"
  - "Detail"
layout_invariants:
  hard:
    - "container は max-w-[1080px] mx-auto"
    - "list 行は clickable、focus-visible ring あり"
    - "pagination は list 直下に配置、sticky 禁止"
  soft:
    - "spacing は 4px grid に従う"
    - "list card は gap-2 / gap-3"
    - "filter は上部横 1 行、超過時は collapse"
ref_archetypes_fit:
  - "Notion"
  - "Linear"
  - "Asana"
  - "Trello"
